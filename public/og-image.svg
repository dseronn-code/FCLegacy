<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508" />
      <stop offset="50%" stop-color="#0e0e14" />
      <stop offset="100%" stop-color="#08080c" />
    </linearGradient>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ccff00" stroke-width="0.7" stroke-opacity="0.04" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <path d="M-100,500 L500,-100 M700,730 L1300,130" stroke="#ccff00" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="10 15" />
  <path d="M0,150 L1200,150 M0,480 L1200,480" stroke="#ccff00" stroke-width="1.5" stroke-opacity="0.05" />

  <circle cx="600" cy="315" r="350" fill="#ccff00" fill-opacity="0.015" filter="blur(60px)" />
  <circle cx="200" cy="150" r="150" fill="#ccff00" fill-opacity="0.01" filter="blur(40px)" />
  <circle cx="1000" cy="480" r="150" fill="#ccff00" fill-opacity="0.01" filter="blur(40px)" />

  <g opacity="0.15" transform="translate(150, 315)">
    <polygon points="0,-100 95,-31 59,81 -59,81 -95,-31" fill="none" stroke="#ccff00" stroke-width="2" />
    <polygon points="0,-70 66,-22 41,57 -41,57 -66,-22" fill="none" stroke="#ccff00" stroke-width="1" stroke-dasharray="2 2" />
    <polygon points="0,-40 38,-13 24,32 -24,32 -38,-13" fill="none" stroke="#ccff00" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#ccff00" stroke-width="1" />
    <line x1="0" y1="0" x2="95" y2="-31" stroke="#ccff00" stroke-width="1" />
    <line x1="0" y1="0" x2="59" y2="81" stroke="#ccff00" stroke-width="1" />
    <line x1="0" y1="0" x2="-59" y2="81" stroke="#ccff00" stroke-width="1" />
    <line x1="0" y1="0" x2="-95" y2="-31" stroke="#ccff00" stroke-width="1" />
    <polygon points="0,-80 75,-25 35,65 -50,40 -40,-13" fill="#ccff00" fill-opacity="0.2" stroke="#ccff00" stroke-width="1.5" />
  </g>

  <g opacity="0.15" transform="translate(950, 185)">
    <polygon points="0,0 120,0 150,30 150,220 30,250 0,220" fill="none" stroke="#ccff00" stroke-width="2" />
    <path d="M 20,40 L 130,40" stroke="#ccff00" stroke-width="1" stroke-dasharray="4 4" />
    <rect x="25" y="60" width="100" height="110" fill="none" stroke="#ccff00" stroke-width="1" />
    <text x="75" y="210" fill="#ccff00" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">LEGACY CARD</text>
  </g>

  <g transform="translate(600, 240)">
    <polygon points="0,-110 100,-60 100,50 0,110 -100,50 -100,-60" fill="#0c0c10" stroke="#ccff00" stroke-width="7" stroke-linejoin="round" filter="url(#softGlow)" />
    <polygon points="0,-95 85,-52 85,42 0,95 -85,42 -85,-52" fill="none" stroke="#ccff00" stroke-width="1.5" stroke-opacity="0.4" stroke-linejoin="round" />
    <text x="0" y="32" fill="#ccff00" font-family="'Impact', 'Arial Black', sans-serif" font-size="80" font-weight="900" text-anchor="middle" letter-spacing="4" filter="url(#neonGlow)">FCL</text>
  </g>

  <text x="600" y="420" fill="#ffffff" font-family="'Montserrat', 'Arial', sans-serif" font-size="44" font-weight="800" text-anchor="middle" letter-spacing="12">FCLEGACY</text>
  <text x="600" y="465" fill="#ccff00" font-family="'Roboto', 'Arial', sans-serif" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="6">GERADOR E ESTATÍSTICAS DE JOGADORES</text>
  <text x="600" y="520" fill="#ffffff" fill-opacity="0.4" font-family="monospace" font-size="15" text-anchor="middle" letter-spacing="4">WOLKSTORE.SHOP</text>

  <line x1="450" y1="490" x2="750" y2="490" stroke="#ccff00" stroke-width="1" stroke-opacity="0.3" />
  <circle cx="600" cy="490" r="4" fill="#ccff00" />
</svg>
